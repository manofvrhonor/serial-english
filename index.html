<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Оффлайн-приложение для изучения английского по сериалам и книгам." />
  <title>Serial English</title>
  <link rel="stylesheet" href="css/styles.css?v=20260661" />
</head>
<body>
  <div class="app" id="app">
    <!-- Боковое меню (desktop) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/>
        </svg>
        <span class="logo-text">Serial English</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-group-label">Разделы</div>
        <button class="menu-item" data-route="import" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          <span class="nav-label">Импорт</span>
        </button>
        <button class="menu-item" data-route="knowledge" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 2 2 4-4"/></svg>
          <span class="nav-label">База знаний</span>
        </button>
        <button class="menu-item" data-route="training" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>
          <span class="nav-label">Тренировка</span>
        </button>
        <button class="menu-item" data-route="shows" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="15" x="2" y="7" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
          <span class="nav-label">Сериалы</span>
        </button>
        <button class="menu-item" data-route="books" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/></svg>
          <span class="nav-label">Книги</span>
        </button>
        <button class="menu-item" data-route="settings" type="button">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          <span class="nav-label">Настройки</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="menu-item sidebar-toggle" id="sidebar-toggle" type="button" aria-label="Свернуть меню">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
          <span class="nav-label">Свернуть меню</span>
        </button>
      </div>
    </aside>

    <div class="main-wrap">
      <main class="content" id="content"></main>
    </div>

    <!-- Нижняя навигация (mobile) -->
    <nav class="mobile-nav" id="mobile-nav" aria-label="Мобильная навигация">
      <button class="mobile-nav-item" data-route="import" type="button">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
        <span>Импорт</span>
      </button>
      <button class="mobile-nav-item" data-route="knowledge" type="button">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 2 2 4-4"/></svg>
        <span>База</span>
      </button>
      <button class="mobile-nav-item" data-route="training" type="button">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>
        <span>Тренировка</span>
      </button>
      <button class="mobile-nav-item" data-route="shows" type="button">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="15" x="2" y="7" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
        <span>Сериалы</span>
      </button>
      <button class="mobile-nav-item" data-route="books" type="button">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/></svg>
        <span>Книги</span>
      </button>
      <button class="mobile-nav-item" data-route="settings" type="button">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>Настройки</span>
      </button>
    </nav>
  </div>

  <div class="modal" id="import-confirm-modal" hidden>
    <div class="modal-backdrop" id="import-confirm-backdrop"></div>
    <div class="modal-card card card-padded" role="dialog" aria-labelledby="import-confirm-title">
      <h2 class="settings-heading" id="import-confirm-title">Подтверждение импорта</h2>
      <div id="import-confirm-body"></div>
      <div class="modal-actions">
        <button type="button" class="btn secondary" id="import-confirm-edit">Поправить</button>
        <button type="button" class="btn" id="import-confirm-ok">ОК</button>
      </div>
    </div>
  </div>

  <div class="modal" id="kb-add-modal" hidden>
    <div class="modal-backdrop" id="kb-add-backdrop"></div>
    <div class="modal-card card card-padded" role="dialog" aria-labelledby="kb-add-title">
      <h2 class="settings-heading" id="kb-add-title">Добавить</h2>
      <label class="field-label field-full">
        <span id="kb-modal-field-label">Слово</span>
        <input type="text" id="kb-modal-text" autocomplete="off" />
      </label>
      <div class="field-label field-full">
        <span class="field-label-text">Перевод</span>
        <div id="kb-modal-trans-chips"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn secondary" id="kb-modal-cancel">Отмена</button>
        <button type="button" class="btn" id="kb-modal-save">Сохранить</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js?v=20260661"></script>
</body>
</html>
